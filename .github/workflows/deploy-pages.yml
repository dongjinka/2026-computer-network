name: Deploy deck to GitHub Pages

# Publishes the self-contained presentation deck in docs/.
# Submodules are intentionally NOT fetched: the deck needs no source code, and
# ION-DTN (src/) pulls in nested submodules — one of them (contrib/rtems_waf on
# gitlab.rtems.org) is unreachable from GitHub runners and would fail the build.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout (no submodules)
        uses: actions/checkout@v4
        with:
          submodules: false
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload docs/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
